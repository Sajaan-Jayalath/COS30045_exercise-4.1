<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 4.1 - SVG Drawing</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Exercise 4.1 - SVG House</h1>
 <div class="svg-container">
    <svg viewBox="0 0 500 500" style="border: 2px solid black; width: 100%;">
 
      <!-- SKY BACKGROUND - rect -->
      <rect x="0" y="0" width="500" height="500" fill="#87CEEB" />
 
      <!-- GRASS / GROUND - rect -->
      <rect x="0" y="330" width="500" height="170" fill="#2E8B22" />
 
      <!-- SUN - circle -->
      <circle cx="390" cy="80" r="50" fill="yellow" />
 
      <!-- TREE TRUNK - rect (moved left by 40px: was 108, now 68) -->
      <rect x="68" y="270" width="22" height="80" fill="#6B3A2A" />
 
      <!-- TREE CANOPY - heart shape using two circles and a path (moved left by 40px) -->
      <circle cx="65" cy="230" r="38" fill="#2E7D1E" />
      <circle cx="98" cy="230" r="38" fill="#2E7D1E" />
      <path d="M65 255 Q79 285 79 285 Q79 285 93 255" fill="#2E7D1E" />
 
      <!-- HOUSE BODY - rect -->
      <rect x="175" y="230" width="240" height="160" fill="#7B3F1E" />
 
      <!-- ROOF - path triangle -->
      <path d="M155 235 L295 110 L435 235 Z" fill="#A0622D" />
 
      <!-- WINDOWS GROUP - g element groups both windows with same style -->
      <g fill="#B8D8E8" stroke="#555" stroke-width="2">
 
        <!-- Left window using transform translate -->
        <g transform="translate(195, 255)">
          <rect x="0" y="0" width="70" height="55" rx="2"/>
          <line x1="35" y1="0" x2="35" y2="55" stroke="#555" stroke-width="2"/>
          <line x1="0" y1="27" x2="70" y2="27" stroke="#555" stroke-width="2"/>
        </g>
 
        <!-- Right window using transform translate -->
        <g transform="translate(325, 255)">
          <rect x="0" y="0" width="70" height="55" rx="2"/>
          <line x1="35" y1="0" x2="35" y2="55" stroke="#555" stroke-width="2"/>
          <line x1="0" y1="27" x2="70" y2="27" stroke="#555" stroke-width="2"/>
        </g>
 
      </g>
 
      <!-- DOOR - rect -->
      <rect x="270" y="310" width="55" height="80" fill="#5C2E0E" rx="3"/>
 
      <!-- DOOR KNOB - circle -->
      <circle cx="316" cy="355" r="5" fill="#222" />
 
      <!-- GARDEN PATH LEFT CURVE - path -->
      <path d="M265 395 Q250 415 265 435 Q280 455 265 475 Q250 495 140 600"
            fill="none" stroke="#C8A400" stroke-width="9" stroke-linecap="round"/>
 
      <!-- GARDEN PATH RIGHT CURVE - path -->
      <path d="M330 395 Q345 415 330 435 Q315 455 330 475 Q345 495 455 600"
            fill="none" stroke="#C8A400" stroke-width="9" stroke-linecap="round"/>
 
      <!-- HOUSE TEXT LABEL - text -->
      <text x="440" y="275"
            font-family="Arial" font-size="18"
            fill="#222">House</text>
 
    </svg>
  </div>

    <!-- STEP 2: ANNOTATED IMAGE -->
    <h2>Annotated Coordinates</h2>
    <img src="annotated.png" width="900">

    <!-- STEP 5: DOM SCREENSHOT -->
    <h2>DOM Structure</h2>
    <img src="dom.png" width="900">

</body>
</html>
